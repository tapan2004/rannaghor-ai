<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b33939" />
      <stop offset="100%" stop-color="#801c1c" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer circle with golden outline -->
  <circle cx="64" cy="64" r="58" fill="url(#bgGrad)" stroke="#f1c40f" stroke-width="3" filter="url(#shadow)" />

  <!-- Steam curves -->
  <path d="M54 38 Q58 28 54 22 M64 35 Q68 25 64 19 M74 38 Q78 28 74 22" 
        stroke="#f39c12" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8" />

  <!-- Traditional Bengali Cooking Handi (Bowl Pot) -->
  <!-- Pot Rim -->
  <ellipse cx="64" cy="64" rx="28" ry="6" fill="#f39c12" />
  <!-- Pot Body -->
  <path d="M36 64 C36 84 44 94 64 94 C84 94 92 84 92 64 Z" fill="#e67e22" />
  <!-- Pot Collar details -->
  <path d="M38 65 Q64 72 90 65" fill="none" stroke="#d35400" stroke-width="2" />

  <!-- Chef Hat on top -->
  <!-- Base band of the hat -->
  <path d="M46 54 L82 54 L80 48 L48 48 Z" fill="#ffffff" stroke="#2c3e50" stroke-width="1.5" />
  <!-- Fluffy top of the chef hat -->
  <path d="M48 48 C42 48 38 40 46 36 C42 30 52 24 60 30 C64 22 76 22 78 30 C86 24 92 32 86 38 C90 44 84 48 78 48 Z" 
        fill="#ffffff" stroke="#2c3e50" stroke-width="1.5" />

  <!-- AI sparkles / stars -->
  <path d="M96 46 L98 42 L102 44 L100 48 L104 50 L100 52 L98 56 L96 52 L92 50 L96 48 Z" fill="#f1c40f" />
  <path d="M26 36 L27 33 L30 34 L29 37 L32 38 L29 39 L28 42 L27 39 L24 38 L27 37 Z" fill="#f1c40f" />
</svg>